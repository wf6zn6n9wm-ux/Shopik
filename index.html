                <p className={`text-[11px] mt-2 ${appDark ? 'text-neutral-500' : 'text-neutral-400'}`}>+ демо-товари, щоб одразу побачити результат</p>

              <button onClick={() => { if (!name.trim()) { flash('Введи назву магазину'); return; } setCreateStep(2); }} className={`w-full font-semibold py-3.5 rounded-full tracking-wide ${appDark ? 'bg-white text-neutral-900' : 'bg-neutral-900 text-white'}`}>Далі →</button>

            </div>
          ) : (
            <div className="space-y-4">
              <div className="rounded-2xl overflow-hidden shadow-sm border border-neutral-200" style={{ backgroundColor: pvBg }}>
                <div className="h-36 flex items-end" style={bannerImg ? { backgroundImage: `url(${bannerImg})`, backgroundSize: 'cover', backgroundPosition: `center ${bannerPos}%` } : { background: bannerPresets[banner] }}>
                  <div className="p-4"><p className="text-[11px] uppercase tracking-[0.25em] text-white" style={{ textShadow: '0 1px 6px rgba(0,0,0,0.6)' }}>{name || 'НАЗВА'}</p></div>
                </div>
                <div className="p-4" style={{ color: pvInk }}>
                  <div className="grid grid-cols-3 gap-2">
                    {[40, 200, 320].map(tn => (<div key={tn} className="h-16 rounded-lg" style={tile(tn, vibe === 'dark')} />))}

                  <button className="mt-3 w-full py-2 rounded-full text-white text-xs font-medium" style={{ backgroundColor: accent }}>До кошика</button>
                </div>
              </div>
              <p className={`text-center text-xs ${appDark ? 'text-neutral-500' : 'text-neutral-400'}`}>Живе превʼю — так виглядатиме магазин</p>

              <div className={`rounded-2xl p-6 space-y-5 ${appDark ? 'bg-neutral-900 border border-neutral-800' : 'bg-white shadow-sm'}`}>

                  <label className={`block text-xs uppercase tracking-wider mb-2 ${appDark ? 'text-neutral-400' : 'text-neutral-500'}`}>Тема</label>

                    <button onClick={() => setVibe('dark')} className={`py-3 rounded-xl border text-sm ${vibe === 'dark' ? (appDark ? 'border-white bg-white text-neutral-900' : 'border-neutral-900 bg-neutral-900 text-white') : (appDark ? 'border-neutral-700 text-neutral-300' : 'border-neutral-300')}`}>Темна</button>

  // ===== BULK UPLOAD + AI =====
  if (page === 'bulk' && activeShop) {

                      </div>
                    </div>
                  </div>

            </>
          )}
        </div>
        <BottomNav active="dashboard" />
      </div>

              <input value={orderSearch} onChange={(e) => setOrderSearch(e.target.value)} placeholder="Пошук за імʼям, телефоном, товаром…" className={`flex-1 py-2 text-sm bg-transparent focus:outline-none ${appDark ? 'text-white placeholder-neutral-500' : ''}`} />
              {orderSearch && <button onClick={() => setOrderSearch('')}><X className="w-4 h-4 text-neutral-400" /></button>}
            </div>
            <div className="flex gap-1.5 overflow-x-auto">
              {['all', ...orderStatuses].map(s => (
                <button key={s} onClick={() => setOrderFilter(s)} className={`px-3 py-1.5 rounded-full text-xs whitespace-nowrap ${orderFilter === s ? (appDark ? 'bg-white text-neutral-900' : 'bg-neutral-900 text-white') : (appDark ? 'bg-neutral-800 text-neutral-300' : 'bg-neutral-100 text-neutral-500')}`}>{s === 'all' ? 'Усі' : s}</button>
              ))}
            </div>
          </div>

          <div className="p-4 pb-24" style={{ background: '#0e1621', minHeight: '80vh' }}>
            <p className="text-center text-[11px] text-neutral-400 mb-4">@{activeShop.name.toLowerCase()}_orders_bot</p>
            <div className="space-y-3">
              {activeShop.orders.filter(o => (orderFilter === 'all' || (o.status || 'Новий') === orderFilter) && `${o.name} ${o.phone} ${o.product}`.toLowerCase().includes(orderSearch.toLowerCase())).map(o => {

                  </div>

            </div>
          </div>
        </div>
        <BottomNav active="orders" />
      </div>
    );
  }

  // ===== CLIENTS (база покупців) =====
  if (page === 'clients' && activeShop) {
    const map = {};
    activeShop.orders.forEach(o => {
      const key = (o.phone || o.name || '—');
      if (!map[key]) map[key] = { name: o.name, phone: o.phone, count: 0, total: 0 };
      map[key].count++;
      const m = (o.comment || '').match(/Сума:\s*([\d\s]+)/);
      if (m) map[key].total += parseInt(m[1].replace(/\s/g, '')) || 0;
    });
    const clients = Object.values(map).sort((x, y) => y.total - x.total);
    return (
      <div className={appDark ? 'min-h-screen bg-neutral-900 text-white' : 'min-h-screen bg-neutral-100'}>

        <div className="max-w-sm mx-auto pb-24">

              <div key={i} className={`rounded-2xl p-3 flex items-center justify-between ${appDark ? 'bg-neutral-800' : 'bg-white shadow-sm'}`}>

                  <div className="w-10 h-10 rounded-full flex items-center justify-center text-white font-semibold" style={{ backgroundColor: activeShop.accent }}>{(c.name || '—').charAt(0).toUpperCase()}</div>
                  <div><p className="font-medium text-sm">{c.name || 'Без імені'}</p><p className="text-xs text-neutral-400">{c.phone}</p></div>
                </div>
                <div className="text-right"><p className="text-sm font-semibold">{c.total.toLocaleString('uk')} ₴</p><p className="text-[11px] text-neutral-400">{c.count} замовл.</p></div>
              </div>
            ))}
            {clients.length === 0 && <p className="text-center text-neutral-400 text-sm py-10">Покупців ще немає</p>}
          </div>
          <p className="px-5 text-xs text-neutral-400">У бойовій версії звідси можна робити розсилки (Telegram / SMS / email).</p>
        </div>
        <BottomNav active="orders" />
      </div>
    );
  }

  // ===== ANALYTICS =====
  if (page === 'analytics' && activeShop) {
    const week = [80, 120, 95, 140, 160, 132, 150];
    const days = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Нд'];
    const max = Math.max(...week);
    const views = activeShop.products.length * 37 + 214;
    const prices = activeShop.products.map(p => p.price);
    const avg = prices.length ? Math.round(prices.reduce((a, b) => a + b, 0) / prices.length) : 0;
    const sum = activeShop.orders.length * avg;
    const top = activeShop.products.slice().sort((a, b) => (b.likes || 0) - (a.likes || 0))[0];
    const au = auditShop(activeShop);
    return (
      <div className={`min-h-screen p-5 ${appDark ? 'bg-neutral-900 text-white' : 'bg-neutral-100'}`}>
        <Toast />
        <div className="max-w-sm mx-auto pb-24">

          <div className="grid grid-cols-3 gap-3 mb-5">
            <div className={`rounded-2xl p-3 text-center ${appDark ? 'bg-neutral-800' : 'bg-white shadow-sm'}`}><div className="text-2xl font-semibold">{activeShop.products.length}</div><div className="text-[10px] text-neutral-400 uppercase tracking-wider">Товари</div></div>
            <div className={`rounded-2xl p-3 text-center ${appDark ? 'bg-neutral-800' : 'bg-white shadow-sm'}`}><div className="text-2xl font-semibold">{activeShop.categories.length}</div><div className="text-[10px] text-neutral-400 uppercase tracking-wider">Категорії</div></div>
            <button onClick={() => setPage('orders')} className={`rounded-2xl p-3 text-center ${appDark ? 'bg-neutral-800' : 'bg-white shadow-sm'}`}><div className="text-2xl font-semibold">{activeShop.orders.length}</div><div className="text-[10px] text-neutral-400 uppercase tracking-wider">Заявки</div></button>
          </div>

          <div className={`rounded-2xl p-4 mb-5 ${appDark ? 'bg-neutral-800' : 'bg-white shadow-sm'}`}>

              <div><div className="text-xl font-semibold">{week[6]}</div><div className="text-[10px] text-neutral-400">відвідувачі</div></div>
              <div><div className="text-xl font-semibold">{views}</div><div className="text-[10px] text-neutral-400">перегляди</div></div>
              <div><div className="text-xl font-semibold">{activeShop.orders.length}</div><div className="text-[10px] text-neutral-400">заявки</div></div>
            </div>
            <p className="text-xs text-neutral-400 mb-1">Відвідувачі за тиждень</p>
            <div className="flex items-end justify-between gap-1.5 h-20">
              {week.map((v, i) => (
                <div key={i} className="flex-1 flex flex-col items-center justify-end h-full">
                  <div className="w-full rounded-t" style={{ height: `${(v / max) * 100}%`, backgroundColor: activeShop.accent }} />
                  <span className="text-[9px] text-neutral-400 mt-1">{days[i]}</span>
                </div>
              ))}
            </div>
          </div>

          <div className={`rounded-2xl p-4 mb-5 ${appDark ? 'bg-neutral-800' : 'bg-white shadow-sm'}`}>
            <p className="font-semibold mb-3">Гроші</p>
            <div className="grid grid-cols-2 gap-3 mb-3">
              <div className={`rounded-xl p-3 ${appDark ? 'bg-neutral-900' : 'bg-neutral-50'}`}><div className="text-lg font-semibold">{sum.toLocaleString('uk')} ₴</div><div className="text-[10px] text-neutral-400">сума замовлень</div></div>
              <div className={`rounded-xl p-3 ${appDark ? 'bg-neutral-900' : 'bg-neutral-50'}`}><div className="text-lg font-semibold">{avg.toLocaleString('uk')} ₴</div><div className="text-[10px] text-neutral-400">середній чек</div></div>
            </div>
            {top && <div className="flex items-center gap-3 text-sm"><div className="w-9 h-9 rounded-lg" style={imgOrTile(top)} /><div><p className="text-[10px] text-neutral-400">Топ-товар</p><p className="font-medium">{top.name}</p></div></div>}
          </div>

          <div className={`rounded-2xl p-4 mb-5 ${appDark ? 'bg-neutral-800' : 'bg-white shadow-sm'}`}>

                <button onClick={() => openProduct(prod)} className="block w-full text-left">
                  <div className="relative rounded-lg overflow-hidden h-48" style={imgOrTile(prod, dark)}>

                    {prod.oldPrice && <span className="absolute top-2 left-2 text-[10px] font-bold text-white px-2 py-0.5 rounded-full" style={{ backgroundColor: '#d23b3b' }}>SALE</span>}

                  {prod.sub && <p className="text-[10px] uppercase tracking-wider mt-2" style={{ color: sub }}>{prod.sub}</p>}

                </button>
                {prod.inStock !== false && typeof prod.stock === 'number' && prod.stock > 0 && prod.stock <= 5 && (<p className="text-[11px] mt-1 font-medium" style={{ color: '#d23b3b' }}>Залишилось {prod.stock} шт.</p>)}
                {prod.preorder ? (
                  <div className="mt-2">
                    <p className="text-[11px] text-center mb-1" style={{ color: '#b8860b' }}>Скоро в наявності</p>
                    <button onClick={() => preorder(prod)} className="w-full text-xs font-medium py-2 rounded-full text-white" style={{ backgroundColor: '#caa64a' }}>Передзамовити</button>
                  </div>
                ) : prod.inStock === false ? (
                  <div className="mt-2">
                    <p className="text-[11px] text-center text-neutral-400 mb-1">Немає в наявності</p>
                    <button onClick={() => flash('Повідомимо, щойно товар зʼявиться ✓')} className="w-full text-xs font-medium py-2 rounded-full border" style={{ borderColor: a, color: a }}>Повідомити про надходження</button>
                  </div>
                ) : (
                  <div className="flex gap-1.5 mt-2">
                    <button onClick={() => addToCart(prod, prod.sizes ? prod.sizes[0] : null, prod.colors ? prod.colors[0] : null)} className="flex-1 text-white text-xs font-medium py-2 rounded-full" style={{ backgroundColor: a }}>{t('toCart')}</button>
                    <button onClick={() => quickOrder(prod)} className="px-3 py-2 rounded-full text-white flex items-center justify-center" style={{ backgroundColor: '#229ED9' }} title="Замовити в Telegram"><Send className="w-3.5 h-3.5" /></button>
                  </div>
                )}
              </div>
            ))}
            {list.length === 0 && <p className="col-span-2 text-center py-10 text-sm" style={{ color: sub }}>Тут порожньо</p>}
          </div>
        </div>
      </div>
    );
  }

  // ===== PRODUCT PAGE =====
  if (page === 'product' && activeShop) {
    const dark = activeShop.vibe === 'dark';
    const bg = dark ? '#0e0e0e' : '#f7f5f2';
    const ink = dark ? '#f5f5f5' : '#161616';
    const sub = dark ? '#9a9a9a' : '#7c7c7c';
    const a = activeShop.accent;
    const prod = activeShop.products.find(p => p.id === viewProduct);
    if (!prod) { return (<div className="min-h-screen flex items-center justify-center" style={{ backgroundColor: bg, color: ink }}><button onClick={() => setPage('catalog')} className="px-5 py-3 rounded-full" style={{ backgroundColor: a, color: '#fff' }}>До каталогу</button></div>); }
    const recos = activeShop.products.filter(p => p.id !== prod.id).slice(0, 6);
    return (
      <div className="min-h-screen" style={{ backgroundColor: bg, color: ink }}>
        <Toast />
        {demoMode ? (
          <div className="fixed bottom-5 left-1/2 -translate-x-1/2 z-[60] flex flex-col items-center gap-1.5">
            <button onClick={() => { setDemoMode(false); setPage('create'); }} className="text-white text-sm font-semibold px-6 py-3 rounded-full shadow-lg" style={{ backgroundColor: a }}>🚀 Створити такий магазин</button>
            <button onClick={() => { setDemoMode(false); setPage('home'); }} className="text-[11px] text-white/80 bg-black/50 px-3 py-1 rounded-full">← На головну</button>
          </div>
        ) : (
          <button onClick={() => setPage('dashboard')} className="fixed bottom-5 left-1/2 -translate-x-1/2 z-[60] bg-neutral-900 text-white text-sm font-medium px-5 py-2.5 rounded-full shadow-lg flex items-center gap-2"><ArrowLeft className="w-4 h-4" /> Вийти з перегляду</button>
        )}
        {sizeGuide && (
          <div className="fixed inset-0 z-[80] flex items-end" onClick={() => setSizeGuide(false)}>
            <div className="absolute inset-0 bg-black/50" />
            <div className="relative w-full max-w-sm mx-auto rounded-t-3xl p-5 pb-8" style={{ backgroundColor: bg, color: ink }} onClick={(e) => e.stopPropagation()}>
              <div className="flex items-center justify-between mb-4"><h3 className="font-semibold">Таблиця розмірів</h3><button onClick={() => setSizeGuide(false)}><X className="w-5 h-5" /></button></div>
              <table className="w-full text-sm">
                <thead><tr style={{ color: sub }}><th className="text-left py-2">Розмір</th><th className="text-left py-2">Груди, см</th><th className="text-left py-2">Талія, см</th></tr></thead>
                <tbody>
                  {[['XS', '82', '62'], ['S', '86', '66'], ['M', '90', '70'], ['L', '94', '74'], ['XL', '98', '78']].map(([s, g, t]) => (
                    <tr key={s} style={{ borderTop: `1px solid ${sub}22` }}><td className="py-2.5 font-medium">{s}</td><td className="py-2.5">{g}</td><td className="py-2.5">{t}</td></tr>
                  ))}

              </table>

            </div>
          </div>

        {lookOpen && (() => { const look = buildLook(prod); const total = look.reduce((s, p) => s + p.price, 0); return (
          <div className="fixed inset-0 z-[80] flex items-end" onClick={() => setLookOpen(false)}>
            <div className="absolute inset-0 bg-black/50" />
            <div className="relative w-full max-w-sm mx-auto rounded-t-3xl p-5 pb-8 max-h-[85vh] overflow-y-auto" style={{ backgroundColor: bg, color: ink }} onClick={(e) => e.stopPropagation()}>
              <div className="flex items-center justify-between mb-1"><h3 className="font-semibold flex items-center gap-2"><Sparkles className="w-4 h-4" style={{ color: a }} /> Готовий образ</h3><button onClick={() => setLookOpen(false)}><X className="w-5 h-5" /></button></div>
              <p className="text-xs mb-4" style={{ color: sub }}>AI-стиліст підібрав комплект із вашого каталогу</p>
              <div className="grid grid-cols-3 gap-2 mb-4">
                {look.map(p => (
                  <button key={p.id} onClick={() => { setLookOpen(false); openProduct(p); }} className="text-left">
                    <div className="rounded-lg overflow-hidden h-28" style={imgOrTile(p, dark)} />
                    <p className="text-[11px] mt-1 leading-tight h-7 overflow-hidden">{p.name}</p>
                    <span className="text-[11px] font-semibold">{p.price} ₴</span>
                  </button>
                ))}
              </div>
              <div className="flex justify-between items-center mb-3"><span style={{ color: sub }}>Образ разом</span><span className="text-lg font-semibold">{total.toLocaleString('uk')} ₴</span></div>
              <button onClick={() => addLookToCart(look)} className="w-full py-3.5 rounded-full font-medium text-white" style={{ backgroundColor: a }}>Додати весь образ у кошик</button>
            </div>
          </div>
        ); })()}
        <div className="max-w-sm mx-auto pb-28">
          <div className="px-5 py-4 flex items-center justify-between" style={{ backgroundColor: bg }}>
            <button onClick={() => setPage('catalog')} className="flex items-center gap-1 text-sm"><ArrowLeft className="w-4 h-4" /> Назад</button>
            <button onClick={() => setPage('cart')} className="relative"><ShoppingBag className={`w-5 h-5 transition-transform duration-300 ${addedPulse ? "scale-125" : "scale-100"}`} />{cartCount > 0 && <span className="absolute -top-1.5 -right-1.5 bg-red-500 text-white text-[9px] rounded-full w-4 h-4 flex items-center justify-center">{cartCount}</span>}</button>
          </div>
          <div className="relative mx-5 rounded-2xl overflow-hidden h-96" style={imgOrTile(prod, dark)}>
            {prod.oldPrice && <span className="absolute top-3 left-3 text-[11px] font-bold text-white px-2 py-1 rounded-full" style={{ backgroundColor: '#d23b3b' }}>SALE</span>}
          </div>
          <div className="px-5 mt-5">
            {prod.sub && <p className="text-[11px] uppercase tracking-wider" style={{ color: sub }}>{prod.category} › {prod.sub}</p>}
            <div className="flex items-start justify-between gap-3">
              <h1 className="text-xl mt-1 leading-snug flex-1" style={{ fontFamily: 'Georgia, serif' }}>{prod.name}</h1>

                <Heart className="w-5 h-5" style={isFav(prod.id) ? { color: '#d23b3b', fill: '#d23b3b' } : { color: sub }} />
              </button>
              <button onClick={() => shareProduct(prod)} className="mt-1 w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0" style={{ border: `1px solid ${sub}44` }}>
                <Share2 className="w-5 h-5" style={{ color: sub }} />

            <div className="flex items-baseline gap-2 mt-2"><span className="text-2xl font-semibold">{prod.price} ₴</span>{prod.oldPrice && <span className="text-sm line-through" style={{ color: sub }}>{prod.oldPrice} ₴</span>}</div>

              <div className="mt-5"><p className="text-xs uppercase tracking-wider mb-2" style={{ color: sub }}>Колір</p><div className="flex gap-2">{prod.colors.map(c => (<button key={c} onClick={() => setSelColor(c)} className="w-9 h-9 rounded-full border-2" style={{ backgroundColor: c, borderColor: selColor === c ? ink : 'transparent' }} />))}</div></div>

            {prod.sizes && prod.sizes.length > 0 && (

                <div className="flex gap-2 flex-wrap">{prod.sizes.map(s => (<button key={s} onClick={() => setSelSize(s)} className="w-12 h-11 rounded-lg border text-sm font-medium" style={selSize === s ? { backgroundColor: ink, color: bg, borderColor: ink } : { borderColor: sub + '66', color: ink }}>{s}</button>))}</div>
              </div>
            )}

            {prod.preorder ? (
              <button onClick={() => preorder(prod)} className="w-full mt-6 py-3.5 rounded-full font-medium text-white" style={{ backgroundColor: '#caa64a' }}>Скоро в наявності — передзамовити</button>
            ) : prod.inStock === false ? (
              <button onClick={() => flash('Повідомимо, щойно товар зʼявиться ✓')} className="w-full mt-6 py-3.5 rounded-full font-medium border" style={{ borderColor: a, color: a }}>Немає в наявності — повідомити</button>

              <div className="mt-6 space-y-2">
                <button onClick={() => addToCart(prod, selSize, selColor)} className="w-full py-3.5 rounded-full font-medium text-white" style={{ backgroundColor: a }}>{t('addCart')}</button>
                <button onClick={() => quickOrder(prod)} className="w-full py-3.5 rounded-full font-medium text-white flex items-center justify-center gap-2" style={{ backgroundColor: '#229ED9' }}><Send className="w-4 h-4" /> {t('orderTg')}</button>
                <button onClick={() => setLookOpen(true)} className="w-full py-3.5 rounded-full font-medium flex items-center justify-center gap-2" style={{ border: `1px solid ${a}`, color: a }}><Sparkles className="w-4 h-4" /> {t('buildLook')}</button>

          </div>

          {recos.length > 0 && (
            <div className="mt-10">
              <h3 className="px-5 text-lg font-semibold tracking-tight mb-3">{t('boughtWith')}</h3>

                {recos.map(r => (
                  <RecCard key={r.id} prod={r} dark={dark} ink={ink} sub={sub} a={a} w="w-32" h="h-40" />
                ))}
              </div></div>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ===== CART PAGE =====
  if (page === 'cart' && activeShop) {
    const dark = activeShop.vibe === 'dark';
    const bg = dark ? '#0e0e0e' : '#f7f5f2';
    const ink = dark ? '#f5f5f5' : '#161616';
    const sub = dark ? '#9a9a9a' : '#7c7c7c';
    const a = activeShop.accent;
    return (
      <div className="min-h-screen" style={{ backgroundColor: bg, color: ink }}>
        <Toast />
        <div className="max-w-sm mx-auto pb-28">
          <div className="px-5 py-4 flex items-center gap-3" style={{ backgroundColor: bg }}>
            <button onClick={() => setPage('preview')}><ArrowLeft className="w-5 h-5" /></button>
            <h1 className="text-lg tracking-[0.2em]" style={{ fontFamily: 'Georgia, serif' }}>{t('cartTitle')}</h1>
          </div>
          {cart.length === 0 ? (
            <div className="px-5 py-20 text-center" style={{ color: sub }}>
              <ShoppingBag className="w-10 h-10 mx-auto mb-3 opacity-40" />
              <p className="text-sm mb-5">{t('emptyCart')}</p>
              <button onClick={() => goCatalog('all')} className="px-6 py-3 rounded-full text-white text-sm font-medium" style={{ backgroundColor: a }}>{t('catalog')}</button>
              {activeShop.cartRecs !== false && activeShop.products.length > 0 && (
                <div className="mt-12 text-left">
                  <p className="text-sm font-semibold mb-3" style={{ color: ink }}>Можливо вам сподобається</p>
                  <div className="grid grid-cols-3 gap-2">
                    {activeShop.products.slice(0, 3).map(prod => (
                      <div key={prod.id} onClick={() => openProduct(prod)} className="text-left cursor-pointer">
                        <div className="rounded-lg overflow-hidden h-28" style={imgOrTile(prod, dark)} />
                        <p className="text-[10px] uppercase tracking-wide mt-1.5 leading-tight h-7 overflow-hidden" style={{ color: ink }}>{prod.name}</p>
                        <p className="text-xs font-semibold" style={{ color: ink }}>{prod.price} ₴</p>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          ) : (
            <>
              <div className="px-5 space-y-3 mt-2">
                {cart.map(c => (
                  <div key={c.key} className="flex gap-3 rounded-2xl p-3" style={{ backgroundColor: dark ? '#1a1a1a' : '#fff' }}>
                    <div className="w-16 h-16 rounded-lg flex-shrink-0" style={c.image ? { backgroundImage: `url(${c.image})`, backgroundSize: 'cover', backgroundPosition: 'center' } : tile(c.tone, dark)} />
                    <div className="flex-1">
                      <p className="text-sm font-medium leading-tight">{c.name}</p>
                      <div className="flex items-center gap-2 mt-0.5">
                        {c.size && <p className="text-[11px]" style={{ color: sub }}>Розмір: {c.size}</p>}
                        {c.color && <span className="w-3.5 h-3.5 rounded-full border" style={{ backgroundColor: c.color, borderColor: sub + '55' }} />}
                      </div>
                      <p className="text-sm font-semibold mt-1">{c.price} ₴</p>
                    </div>
                    <div className="flex flex-col items-end justify-between">
                      <button onClick={() => removeCart(c.key)}><X className="w-4 h-4" style={{ color: sub }} /></button>
                      <div className="flex items-center gap-2">
                        <button onClick={() => changeQty(c.key, -1)} className="w-6 h-6 rounded-full border flex items-center justify-center" style={{ borderColor: sub + '66' }}>−</button>
                        <span className="text-sm w-4 text-center">{c.qty}</span>
                        <button onClick={() => changeQty(c.key, 1)} className="w-6 h-6 rounded-full border flex items-center justify-center" style={{ borderColor: sub + '66' }}>+</button>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
              {activeShop.cartRecs !== false && (() => {
                const inCart = cart.map(c => c.id);
                const recs = activeShop.products.filter(p => !inCart.includes(p.id)).slice(0, 4);
                if (!recs.length) return null;
                return (
                  <div className="px-5 mt-6">
                    <p className="text-sm font-semibold mb-3" style={{ color: ink }}>{t('boughtWith')}</p>
                    <div className="flex gap-3 overflow-x-auto pb-1" style={{ scrollbarWidth: 'none' }}>
                      {recs.map(prod => (
                        <RecCard key={prod.id} prod={prod} dark={dark} ink={ink} sub={sub} a={a} />
                      ))}
                    </div>
                  </div>
                );
              })()}
              <div className="px-5 mt-6">
                {activeShop.freeShipFrom > 0 && (() => {
                  const left = activeShop.freeShipFrom - cartTotal;
                  const prog = Math.min(100, Math.round((cartTotal / activeShop.freeShipFrom) * 100));
                  return (
                    <div className="mb-4 rounded-2xl p-3" style={{ backgroundColor: dark ? '#1a1a1a' : '#fff' }}>
                      <p className="text-xs mb-2" style={{ color: ink }}>
                        {left > 0
                          ? <span>Додай ще <b>{left.toLocaleString('uk')} ₴</b> — і доставка <b>безкоштовна</b> 🚚</span>
                          : <span>🎉 Безкоштовна доставка активована!</span>}
                      </p>
                      <div className="h-2 rounded-full overflow-hidden" style={{ backgroundColor: dark ? '#2a2a2a' : '#eee' }}>
                        <div className="h-full rounded-full transition-all duration-500 ease-out" style={{ width: `${prog}%`, backgroundColor: a }} />
                      </div>
                    </div>
                  );
                })()}
                <div className="flex gap-2 mb-4">
                  <input value={promoInput} onChange={(e) => setPromoInput(e.target.value)} placeholder="Промокод (напр. SALE10)" className="flex-1 rounded-xl p-2.5 text-sm" style={{ backgroundColor: dark ? '#1a1a1a' : '#fff', border: `1px solid ${sub}44`, color: ink }} />
                  <button onClick={applyPromoCode} className="px-4 rounded-xl text-sm font-medium" style={{ backgroundColor: ink, color: bg }}>OK</button>
                </div>
                <div className="flex justify-between items-center text-sm mb-1" style={{ color: sub }}><span>Товари</span><span>{cartTotal.toLocaleString('uk')} ₴</span></div>
                {promoDisc > 0 && <div className="flex justify-between items-center text-sm mb-1" style={{ color: '#d23b3b' }}><span>Промокод −{Math.round(promoDisc * 100)}%</span><span>−{Math.round(cartTotal * promoDisc).toLocaleString('uk')} ₴</span></div>}
                <div className="flex justify-between items-center mb-4 mt-2"><span style={{ color: sub }}>{t('total')}</span><span className="text-xl font-semibold">{Math.round(cartTotal * (1 - promoDisc)).toLocaleString('uk')} ₴</span></div>

                <p className="text-[11px] text-center mt-2" style={{ color: sub }}>Далі — дані для доставки</p>
              </div>
            </>
          )}
        </div>
      </div>
    );

  // ===== CHECKOUT =====
  if (page === 'checkout' && activeShop) {
    const dark = activeShop.vibe === 'dark';
    const bg = dark ? '#0e0e0e' : '#f7f5f2';
    const ink = dark ? '#f5f5f5' : '#161616';
    const sub = dark ? '#9a9a9a' : '#7c7c7c';
    const a = activeShop.accent;
    const finalSum = Math.round(cartTotal * (1 - promoDisc));
    const inp = { backgroundColor: dark ? '#1a1a1a' : '#fff', border: `1px solid ${sub}44`, color: ink };
    return (
      <div className="min-h-screen" style={{ backgroundColor: bg, color: ink }}>
        <Toast />
        <div className="max-w-sm mx-auto pb-28">
          <div className="px-5 py-4 flex items-center gap-3" style={{ backgroundColor: bg }}>
            <button onClick={() => setPage('cart')}><ArrowLeft className="w-5 h-5" /></button>
            <h1 className="text-lg tracking-[0.2em]" style={{ fontFamily: 'Georgia, serif' }}>ОФОРМЛЕННЯ</h1>
          </div>
          <div className="px-5 space-y-4 mt-2">
            <div>
              <label className="block text-xs uppercase tracking-wider mb-1" style={{ color: sub }}>Імʼя та прізвище</label>
              <input value={coName} onChange={(e) => setCoName(e.target.value)} placeholder="Олена Коваленко" className="w-full rounded-xl p-3 text-sm" style={inp} />
            </div>
            <div>
              <label className="block text-xs uppercase tracking-wider mb-1" style={{ color: sub }}>Телефон</label>
              <input value={coPhone} onChange={(e) => setCoPhone(e.target.value)} type="tel" placeholder="+380 __ ___ __ __" className="w-full rounded-xl p-3 text-sm" style={inp} />
            </div>
            <div>
              <label className="block text-xs uppercase tracking-wider mb-2" style={{ color: sub }}>Доставка</label>
              <div className="grid grid-cols-2 gap-2">
                <button onClick={() => setCoDelivery('np')} className="py-3 rounded-xl text-sm" style={coDelivery === 'np' ? { backgroundColor: ink, color: bg } : inp}>Нова Пошта</button>
                <button onClick={() => setCoDelivery('pickup')} className="py-3 rounded-xl text-sm" style={coDelivery === 'pickup' ? { backgroundColor: ink, color: bg } : inp}>Самовивіз</button>
              </div>
              {coDelivery === 'np' && <input value={coBranch} onChange={(e) => setCoBranch(e.target.value)} placeholder="№ відділення / місто" className="w-full rounded-xl p-3 text-sm mt-2" style={inp} />}

                    <div className="flex items-center justify-between">
                      <div><p className="font-semibold">Безкоштовна доставка</p><p className="text-xs text-neutral-400 mt-0.5">Прогрес-бар у кошику від суми</p></div>
                      <Toggle on={activeShop.freeShipFrom > 0} onClick={() => updateShop({ freeShipFrom: activeShop.freeShipFrom > 0 ? 0 : 1500 })} />
                    </div>
                    {activeShop.freeShipFrom > 0 && (<div className="mt-3"><label className="block text-xs uppercase tracking-wider text-neutral-500 mb-2">Поріг, ₴</label><div className="grid grid-cols-4 gap-2">{[800, 1000, 1500, 2000].map(v => (<button key={v} onClick={() => updateShop({ freeShipFrom: v })} className={`py-2 rounded-xl border text-sm font-medium ${activeShop.freeShipFrom === v ? (appDark ? 'bg-white text-neutral-900 border-white' : 'bg-neutral-900 text-white border-neutral-900') : (appDark ? 'border-neutral-700 text-neutral-300' : 'border-neutral-300')}`}>{v}</button>))}</div></div>)}
                  </div>
                  <hr className={appDark ? 'border-neutral-700' : ''} />
                  <div className="flex items-center justify-between">
                    <div><p className="font-semibold">Розміри на рекомендаціях</p><p className="text-xs text-neutral-400 mt-0.5">Вибір розміру і «+» на картках</p></div>
                    <Toggle on={activeShop.recSizes !== false} onClick={() => updateShop({ recSizes: !(activeShop.recSizes !== false) })} />
                  </div>
                  <hr className={appDark ? 'border-neutral-700' : ''} />
                  <div className="flex items-center justify-between">
                    <div><p className="font-semibold">Кнопка швидкого замовлення</p><p className="text-xs text-neutral-400 mt-0.5">«До кошика» на картці товару</p></div>
                    <Toggle on={activeShop.quickBuy !== false} onClick={() => updateShop({ quickBuy: !(activeShop.quickBuy !== false) })} />
                  </div>
                  <hr className={appDark ? 'border-neutral-700' : ''} />
                  <div className="flex items-center justify-between">
                    <div><p className="font-semibold">Рекомендації в кошику</p><p className="text-xs text-neutral-400 mt-0.5">«Можливо вам сподобається»</p></div>
                    <Toggle on={activeShop.cartRecs !== false} onClick={() => updateShop({ cartRecs: !(activeShop.cartRecs !== false) })} />
                  </div>
                  <hr className={appDark ? 'border-neutral-700' : ''} />
                  <div className="flex items-center justify-between">
                    <div><p className="font-semibold">Відгуки на сайті</p><p className="text-xs text-neutral-400 mt-0.5">Показувати блок відгуків</p></div>
                    <Toggle on={activeShop.showReviews !== false} onClick={() => updateShop({ showReviews: !(activeShop.showReviews !== false) })} />
                  </div>
                </div>
              );
            }

            // ===== СТОРІНКИ МАГАЗИНУ =====
            if (setSection === 'pages') {
              return (
                <div className={card}>
                  <SectionHead title="Сторінки магазину" />
                  <label className="block text-xs uppercase tracking-wider text-neutral-500 mb-1">Про нас</label>
                  <textarea value={activeShop.about} onChange={(e) => updateShop({ about: e.target.value })} rows={3} className={`${inputC} mb-3`} />
                  <label className="block text-xs uppercase tracking-wider text-neutral-500 mb-1">Доставка</label>
                  <textarea value={activeShop.delivery} onChange={(e) => updateShop({ delivery: e.target.value })} rows={2} className={`${inputC} mb-3`} />
                  <label className="block text-xs uppercase tracking-wider text-neutral-500 mb-1">Оплата</label>
                  <textarea value={activeShop.payment} onChange={(e) => updateShop({ payment: e.target.value })} rows={2} className={inputC} />
                </div>
              );
            }

            // ===== ПРОМОКОДИ =====
            if (setSection === 'promos') {
              return (
                <div className={card}>
                  <SectionHead title="Промокоди" />
                  <p className="text-xs text-neutral-400 mb-3">Створи окремий код кожному блогеру — і дивись, хто приносить замовлення.</p>
                  <div className="space-y-2 mb-3">
                    {(activeShop.promos || []).map(pr => {
                      const ref = `shopik.app/${activeShop.name.toLowerCase()}?ref=${pr.code}`;
                      return (
                        <div key={pr.code} className="border rounded-xl px-3 py-2.5">
                          <div className="flex items-center justify-between">
                            <div className="min-w-0">
                              <p className="text-sm truncate"><span className="font-semibold">{pr.code}</span> · −{Math.round(pr.disc * 100)}%</p>
                              {pr.label && <p className="text-[11px] text-neutral-400 truncate">{pr.label}</p>}
                            </div>
                            <button onClick={() => deletePromo(pr.code)} className="text-neutral-400 hover:text-red-600 flex-shrink-0 ml-2"><Trash2 className="w-4 h-4" /></button>
                          </div>
                          <div className="flex gap-1.5 mt-2">
                            <input value={ref} disabled className="flex-1 min-w-0 bg-neutral-100 border rounded-lg px-2 py-1.5 text-[11px] text-neutral-600" />
                            <button onClick={() => copyLink(ref)} className="bg-neutral-900 text-white px-2.5 rounded-lg text-[11px] flex-shrink-0">Копі</button>
                            <button onClick={() => setQrOpen(qrOpen === pr.code ? null : pr.code)} className="border rounded-lg px-2 flex-shrink-0"><Share2 className="w-3.5 h-3.5 text-neutral-600" /></button>
                          </div>
                          {qrOpen === pr.code && <div className="flex justify-center mt-2"><div className="border rounded-xl p-2 bg-white">{renderQR(ref, 96)}</div></div>}
                          <div className="flex gap-3 mt-2 text-[11px] text-neutral-500">
                            <span>переходи: <b className="text-neutral-700">{pr.clicks || 0}</b></span>
                            <span>замовлення: <b className="text-neutral-700">{pr.uses || 0}</b></span>
                            <span>сума: <b className="text-neutral-700">{(pr.revenue || 0).toLocaleString('uk')} ₴</b></span>
                          </div>
                        </div>
                      );
                    })}
                    {(activeShop.promos || []).length === 0 && <p className="text-xs text-neutral-400">Промокодів ще немає</p>}
                  </div>
                  <input value={newPromoLabel} onChange={(e) => setNewPromoLabel(e.target.value)} placeholder="Блогер / привід (напр. @anna_blog)" className="w-full border rounded-xl p-2.5 text-sm mb-2" />
                  <div className="flex gap-2">
                    <input value={newPromoCode} onChange={(e) => setNewPromoCode(e.target.value)} placeholder="КОД (напр. ANNA10)" className="flex-1 border rounded-xl p-2.5 text-sm uppercase" />
                    <input value={newPromoDisc} onChange={(e) => setNewPromoDisc(e.target.value)} type="number" placeholder="%" className="w-16 border rounded-xl p-2.5 text-sm" />
                    <button onClick={addPromo} className="bg-neutral-900 text-white px-4 rounded-xl text-sm font-medium">+</button>
                  </div>
                </div>
              );
            }

            return null;
          })()}
          <button onClick={() => { setTab('NEW'); setPage('preview'); }} className="w-full mt-5 bg-neutral-900 text-white py-3.5 rounded-full font-medium">Подивитись витрину →</button>
        </div>
        <BottomNav active="settings" />
      </div>
    );
  }

  // ===== MY SHOPS =====
  if (page === 'myshops') {
    return (
      <div className={`min-h-screen p-5 ${appDark ? 'bg-neutral-900 text-white' : 'bg-neutral-100'}`}>
        <Toast />
        <div className="max-w-sm mx-auto">
          <button onClick={() => setPage('home')} className={`mb-5 text-sm ${appDark ? 'text-neutral-400' : 'text-neutral-500'}`}>← Назад</button>
          <h2 className="text-2xl font-semibold mb-6 tracking-tight">Мої магазини</h2>
          <div className="space-y-3">
            {shops.map(shop => (
              <div key={shop.id} className={`w-full rounded-2xl p-4 flex items-center gap-3 ${appDark ? 'bg-neutral-800' : 'bg-white shadow-sm'}`}>
                <button onClick={() => { setActiveShop(shop); setPage('dashboard'); }} className="flex items-center gap-3 flex-1 text-left">
                  <div className="w-11 h-11 rounded-full" style={{ backgroundColor: shop.accent }} />
                  <div><h3 className="font-semibold tracking-wide">{shop.name.toUpperCase()}</h3><p className="text-xs text-neutral-400">{shop.products.length} товарів</p></div>
                </button>
                <button onClick={() => duplicateShop(shop)} className={`text-xs border rounded-full px-3 py-1.5 whitespace-nowrap ${appDark ? 'border-neutral-600' : 'border-neutral-300'}`}>Копіювати</button>
              </div>
            ))}
          </div>
          <button onClick={() => setPage('create')} className={`w-full mt-6 font-medium py-3.5 rounded-full ${appDark ? 'bg-white text-neutral-900' : 'bg-neutral-900 text-white'}`}>Новий магазин</button>
        </div>
      </div>
    );
  }

  return (<div className={`min-h-screen flex items-center justify-center ${appDark ? 'bg-neutral-900' : 'bg-neutral-100'}`}><button onClick={() => setPage('home')} className={`px-6 py-3 rounded-full ${appDark ? 'bg-white text-neutral-900' : 'bg-neutral-900 text-white'}`}>На головну</button></div>);
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ShopPlatform />);
</script>
</body>
</html>
